{% load static %}
<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.2/css/all.css">
</head>
<body>
    <!-- ВЕРХНЯЯ НАВИГАЦИЯ -->
    <header class="top-nav">
        <div class="top-nav-left">
            <!-- Кнопка бургер-меню для мобильной версии -->
            <button class="burger-menu" id="sidebarToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <!-- Логотип -->
            <a href="{% url 'home' %}" class="logo">
                <img src="{% static 'main/img/free-icon-video-game-4562862.png' %}" alt="Лого" class="logo-img">
                <span class="logo-text">FitTrack</span>
            </a>
        </div>

        <div class="top-nav-right">
            <!-- Уведомления -->
            <div class="notifications">
                <i class="fas fa-bell"></i>
                <span class="badge">3</span>
            </div>

            <!-- Аватар пользователя / Вход -->
            <!-- Аватар пользователя / Вход -->
        <a href="{% url 'users' %}" class="user-avatar-link">
            <div class="user-avatar">
                <img src="https://via.placeholder.com/40x40" alt="Avatar">
            </div>
        </a>
        </div>
    </header>

    <!-- БОКОВАЯ ПАНЕЛЬ (обновленная) -->
    <aside id="sidebar">
        <!-- Заголовок навигации -->
        <h3><i class="fas fa-compass"></i> Навигация</h3>

        <!-- Основное меню -->
        <ul>
            <li class="{% if request.path == '/' %}active{% endif %}">
                <a href="{% url 'home' %}">
                    <i class="fas fa-home"></i>
                    <span>Главная</span>
                </a>
            </li>
            <li class="{% if request.path == '/type/' %}active{% endif %}">
                <a href="{% url 'type' %}">
                    <i class="fas fa-dumbbell"></i>
                    <span>Спортивные направления</span>
                </a>
            </li>
            <li>
                <a href="{% url 'trainings' %}">
                    <i class="fas fa-calendar-check"></i>
                    <span>Мои тренировки</span>
                </a>
            </li>
            <li>
                <a href="{% url 'progress' %}">
                    <i class="fas fa-chart-line"></i>
                    <span>Прогресс</span>
                </a>
            </li>
            <li>
                <a href="{% url 'nutrition' %}">
                    <i class="fas fa-apple-alt"></i>
                    <span>Питание</span>
                </a>
            </li>
        </ul>

        <!-- Дополнительные разделы -->
        <ul class="nav-menu-bottom">
            <li>
                <a href="{% url 'knowledge' %}">
                    <i class="fas fa-book"></i>
                    <span>База знаний</span>
                </a>
            </li>
            <li>
                <a href="{% url 'settings' %}">
                    <i class="fas fa-cog"></i>
                    <span>Настройки</span>
                </a>
            </li>
            <li>
                <a href="{% url 'help' %}">
                    <i class="fas fa-question-circle"></i>
                    <span>Помощь</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main>
        <div class="main_class">
            {% block content %}
            <!-- Здесь будет контент из дочерних шаблонов -->
            {% endblock %}
        </div>
    </main>

    <!-- JavaScript для мобильного меню -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarToggle');

            if (toggleBtn) {
                toggleBtn.addEventListener('click', function() {
                    sidebar.classList.toggle('show');
                });
            }

            // Закрывать меню при клике вне его (на мобильных)
            document.addEventListener('click', function(event) {
                const isMobile = window.innerWidth <= 768;
                const isClickInsideSidebar = sidebar.contains(event.target);
                const isClickOnToggle = toggleBtn.contains(event.target);

                if (isMobile && !isClickInsideSidebar && !isClickOnToggle && sidebar.classList.contains('show')) {
                    sidebar.classList.remove('show');
                }
            });
        });
    </script>
</body>
</html>

</body>


</html>

{% extends 'main/base.html' %}

{% block title %}Выбор спорта — FitTrack{% endblock %}

{% block content %}
<div class="ft-page">
    <div class="page-header">
        <h1>Выберите направление</h1>
        <div class="header-line"></div>
        <p class="subtitle">Подберём программу тренировок под ваш вид спорта</p>
    </div>

    <div class="form-card">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" for="sport_type">Вид спорта</label>
                <select name="sport_type" id="sport_type" class="form-select" required>
                    <option value="">— Выберите —</option>
                    {% for key, value in sport_types %}
                    <option value="{{ key }}"{% if key == selected_sport %} selected{% endif %}>{{ value }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn-ft-primary w-100">Далее</button>
        </form>
    </div>
</div>
{% endblock %}
